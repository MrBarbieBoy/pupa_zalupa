<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>I love u, Rita</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffe4ec;
            color: #5e2a3c;
            padding: 20px;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        /* Блок 0: заголовок и вступление */
        .main-title {
            font-family: 'Georgia', serif;
            font-size: 54px;
            color: #ff6699;
            text-align: center;
            margin: 20px 0 12px;
            text-shadow: 3px 3px 15px rgba(255, 102, 153, 0.4);
            letter-spacing: 1px;
        }

        .intro-text {
            text-align: center;
            font-size: 18px;
            color: #cc6699;
            margin-bottom: 35px;
            font-style: italic;
            line-height: 1.4;
            padding: 0 10px;
        }

        /* Карточка свидания */
        .date-card {
            background: rgba(255, 248, 250, 0.95);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            text-align: center;
            transition: transform 0.2s;
        }

        .date-card h2 {
            font-size: 26px;
            color: #ff6699;
            margin-bottom: 20px;
        }

        .date-display {
            font-size: 22px;
            font-weight: bold;
            color: #b2456e;
            margin: 15px 0;
        }

        /* Кнопки */
        .btn {
            background: #ff99bb;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            color: #5e2a3c;
            cursor: pointer;
            transition: 0.2s;
            margin: 8px 8px 0 0;
            display: inline-block;
            font-family: inherit;
        }

        .btn-primary {
            background: #ff6699;
            color: white;
            box-shadow: 0 4px 12px rgba(255, 102, 153, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.96);
        }

        /* Полноэкранное модальное окно */
        .full-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: #ffeef4;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            border-radius: 48px;
            padding: 24px 20px 30px;
            text-align: center;
            overflow-y: auto;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-content h3 {
            font-size: 28px;
            color: #ff6699;
            margin-bottom: 15px;
        }

        .timer-full {
            font-size: 28px;
            font-weight: bold;
            background: #ffe0e8;
            display: inline-block;
            padding: 12px 24px;
            border-radius: 60px;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .dress-code {
            background: #ffd9e6;
            padding: 12px;
            border-radius: 40px;
            margin: 15px 0;
            font-size: 17px;
        }

        .secret-input {
            margin: 20px 0;
        }

        .secret-input input {
            padding: 12px 18px;
            border-radius: 50px;
            border: 1px solid #ff99bb;
            width: 80%;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        .map-place {
            margin-top: 15px;
            border-radius: 28px;
            overflow: hidden;
            display: none;
        }

        .map-place iframe {
            width: 100%;
            height: 200px;
            border: none;
        }

        /* Анимация сердечек */
        .heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            animation: fly 1s ease-out forwards;
            z-index: 3000;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-150px) scale(1.5);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Кнопка закрытия */
        .close-modal-btn {
            background: #ffb3cc;
            margin-top: 20px;
        }

        /* Адаптация */
        @media (max-width: 500px) {
            .main-title { font-size: 42px; }
            .timer-full { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Блок 0: заголовок и вступление -->
    <div class="main-title">I love u, Rita</div>
    <div class="intro-text">
        Каждый день с тобой — маленькая сказка. <br>
        Здесь живут наши самые тёплые воспоминания, планы и мечты. <br>
        Для тебя, Рита ❤️
    </div>

    <!-- Блок 1: Карточка свидания -->
    <div class="date-card" id="dateCard">
        <h2>💖 Приглашение на свидание</h2>
        <div class="date-display" id="dateDisplay">📅 30 июня 2026, 19:00</div>
        <button class="btn btn-primary" id="viewFullBtn">✨ Посмотреть ✨</button>
    </div>
</div>

<!-- Полноэкранное модальное окно (Блок 1 - детали) -->
<div class="full-modal" id="fullModal">
    <div class="modal-content">
        <h3>💘 Наше свидание 💘</h3>
        <div id="fullDateText" style="font-size: 20px; font-weight: bold;">📅 30 июня 2026, 19:00</div>
        <div class="timer-full" id="countdownTimer">Загрузка...</div>
        <div class="dress-code">🎀 Dress code: твоё любимое платье 🎀</div>

        <!-- Скрытое поле с паролем -->
        <div class="secret-input">
            <input type="password" id="secretPassword" placeholder="Введи дату знакомства (ДД.ММ.ГГГГ)">
            <button class="btn" id="unlockMapBtn" style="margin-top: 10px;">🔓 Открыть место встречи</button>
        </div>
        <div class="map-place" id="mapContainer">
            <!-- Здесь будет карта (Яндекс) -->
            <iframe id="yandexMap" src="about:blank"></iframe>
        </div>

        <!-- Кнопки действий -->
        <button class="btn btn-primary" id="goBtn">💗 Пойду! 💗</button>
        <button class="btn" id="remindTelegramBtn">🔔 Напомнить в Telegram</button>
        <button class="btn close-modal-btn" id="closeModalBtn">📱 Свернуть окно</button>
    </div>
</div>

<script>
    // ======================= НАСТРОЙКИ (ТЫ МЕНЯЕШЬ ЗДЕСЬ) =======================
    // Дата и время свидания (год, месяц (0=январь), число, час, минута)
    const targetDate = new Date(2026, 5, 15, 12, 0, 0);  // 30 июня 2026, 19:00
    
    // Пароль для открытия места (дата знакомства)
    const correctPassword = "15.12.2025";   // <- поменяй на свою дату
    
    // Ссылка на карту с местом встречи (Яндекс.Карты или Google)
    // Пример: Яндекс.Карты с меткой. Ты можешь вставить любую ссылку "Поделиться"
    const meetingMapUrl = "https://yandex.ru/map-widget/v1/?um=constructor%3A123456789&source=constructor";  // <- замени на реальную ссылку карты
    // =========================================================================

    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();  // растягиваем на весь экран

    // Включаем вибрацию (если доступно)
    const haptic = () => {
        if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
        }
    };

    // Функция обновления таймера (дни, часы, минуты, секунды)
    function updateTimers() {
        const now = new Date();
        const diff = targetDate - now;
        
        if (diff <= 0) {
            document.getElementById('countdownTimer').innerHTML = "❤️ СЕГОДНЯ! ❤️";
            return;
        }
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        
        const timerText = `${days}д ${hours}ч ${minutes}м ${seconds}с`;
        document.getElementById('countdownTimer').innerHTML = timerText;
    }
    
    // Запускаем таймер и обновляем каждую секунду
    updateTimers();
    setInterval(updateTimers, 1000);
    
    // Отображение даты в человеческом виде
    const formattedDate = targetDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    document.getElementById('dateDisplay').innerHTML = `📅 ${formattedDate}`;
    document.getElementById('fullDateText').innerHTML = `📅 ${formattedDate}`;
    
    // Элементы модального окна
    const modal = document.getElementById('fullModal');
    const viewFullBtn = document.getElementById('viewFullBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const goBtn = document.getElementById('goBtn');
    const remindBtn = document.getElementById('remindTelegramBtn');
    const unlockMapBtn = document.getElementById('unlockMapBtn');
    const secretPassInput = document.getElementById('secretPassword');
    const mapContainer = document.getElementById('mapContainer');
    const mapIframe = document.getElementById('yandexMap');
    
    // Открыть полноэкранное окно
    viewFullBtn.addEventListener('click', () => {
        modal.style.display = 'flex';
        haptic();
        tg.expand();  // на случай, если не растянуто
    });
    
    // Свернуть окно
    closeModalBtn.addEventListener('click', () => {
        modal.style.display = 'none';
        haptic();
    });
    
    // Кнопка "Пойду!" - летят сердечки
    goBtn.addEventListener('click', () => {
        haptic();
        // Создаём 20 сердечек по всему экрану
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '💘'][Math.floor(Math.random() * 6)];
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = Math.random() * 80 + '%';
            heart.style.fontSize = (20 + Math.random() * 30) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
        tg.showAlert("Я так жду этой встречи ❤️ Спасибо, что согласилась!");
    });
    
    // Кнопка "Напомнить в Telegram"
    remindBtn.addEventListener('click', () => {
        haptic();
        tg.showPopup({
            title: "🔔 Напоминание",
            message: "Я пришлю уведомление за час до свидания!",
            buttons: [{ type: "ok" }]
        });
        // Здесь можно будет позже добавить реальную отправку через бота
    });
    
    // Открыть карту по паролю
    unlockMapBtn.addEventListener('click', () => {
        const enteredPass = secretPassInput.value.trim();
        if (enteredPass === correctPassword) {
            haptic();
            mapContainer.style.display = 'block';
            // Устанавливаем карту
            mapIframe.src = meetingMapUrl;
            tg.showAlert("🎉 Поздравляю! Вот место нашей встречи. Сохрани в тайне 🫢");
        } else {
            tg.showAlert("❌ Неправильная дата... Попробуй ещё раз, это важно 💔");
            haptic();
        }
    });
    
    // Закрытие модального окна при клике на фон (по желанию)
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
    
    // Дополнительно: чтобы таймер не тормозил при скрытой вкладке — норм.
</script>
</body>
</html>
