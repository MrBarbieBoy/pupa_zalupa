<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>I love u, Rita</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключение шрифта MTS Wide (аналог, максимально близкий) -->
    <link href="https://fonts.cdnfonts.com/css/mts-wide" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'MTS Wide', 'Posto One', 'Segoe UI', -apple-system, sans-serif;
            background: #ffe4ec;
            color: #1a1a1a;  /* чёрный текст везде */
            padding: 20px;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        /* Заголовок и вступление */
        .main-title {
            font-family: 'MTS Wide', 'Posto One', sans-serif;
            font-size: 52px;
            color: #1a1a1a;
            text-align: center;
            margin: 20px 0 12px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .intro-text {
            text-align: center;
            font-size: 18px;
            color: #1a1a1a;
            margin-bottom: 35px;
            line-height: 1.4;
            padding: 0 10px;
        }

        /* Карточка приглашения */
        .date-card {
            background: rgba(255, 248, 250, 0.95);
            border-radius: 48px;
            padding: 30px 20px 35px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            text-align: center;
            position: relative;
        }

        .date-display {
            font-size: 24px;
            font-weight: 500;
            color: #1a1a1a;
            margin: 20px 0 30px;
        }

        /* Кнопка "Посмотреть" — стеклянная, наполовину наружу */
        .glass-btn {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 60px;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'MTS Wide', sans-serif;
            margin-top: 10px;
            margin-bottom: -45px;  /* чтобы кнопка выступала вниз */
            position: relative;
            z-index: 10;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .glass-btn:active {
            transform: scale(0.97);
        }

        /* Модальное окно (полноэкранное) */
        .full-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #ffeef4;
            width: 90%;
            max-width: 480px;
            max-height: 85vh;
            border-radius: 48px;
            padding: 30px 24px 40px;
            overflow-y: auto;
            position: relative;
            font-family: 'MTS Wide', sans-serif;
            color: #1a1a1a;
        }

        /* Убираем лишние смайлики, оставляем только нужные */
        .no-emoji {
            /* просто класс-маркер */
        }

        .modal-content h3 {
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Таймер: слева, без фона, крупно */
        .timer-section {
            text-align: left;
            margin: 10px 0 15px;
        }
        .timer-label {
            font-size: 16px;
            opacity: 0.7;
        }
        .timer-full {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1a1a1a;
        }

        /* Dress code — просто текст */
        .dress-code {
            margin: 15px 0 25px;
            font-size: 18px;
            text-align: left;
        }

        /* Поле ввода и кнопка открыть место — одинаковой ширины */
        .secret-input {
            margin: 20px 0 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .secret-input input {
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #ccb3bc;
            width: 100%;
            font-size: 16px;
            text-align: center;
            outline: none;
            font-family: inherit;
        }
        .secret-input button {
            width: 100%;
        }

        /* Карта и твоё изображение */
        .map-place {
            margin: 15px 0;
            border-radius: 32px;
            overflow: hidden;
            display: none;
        }
        .map-place iframe {
            width: 100%;
            height: 200px;
            border: none;
        }
        .custom-image {
            margin: 20px 0;
            text-align: center;
        }
        .custom-image img {
            max-width: 100%;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* Кнопки общие */
        .btn {
            background: #e6ccd4;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background: #ff99bb;
            color: #1a1a1a;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .btn-primary:active, .btn:active {
            transform: scale(0.97);
        }

        /* Две кнопки в ряд */
        .double-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }
        .double-buttons .btn {
            flex: 1;
        }

        /* Анимация сердечек */
        .heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            animation: fly 1s ease-out forwards;
            z-index: 3000;
        }
        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-title">I love u, Rita</div>
    <div class="intro-text">
        Каждый день с тобой — маленькая сказка.<br>
        Здесь живут наши самые тёплые воспоминания, планы и мечты.<br>
        Для тебя, Рита
    </div>

    <!-- Карточка приглашения -->
    <div class="date-card">
        <div class="date-display">15 июня, 12:00</div>
        <button class="glass-btn" id="viewFullBtn">Посмотреть</button>
    </div>
</div>

<!-- Полноэкранное окно -->
<div class="full-modal" id="fullModal">
    <div class="modal-content">
        <h3>Наше свидание</h3>

        <!-- Таймер слева -->
        <div class="timer-section">
            <div class="timer-full" id="countdownTimer">Загрузка...</div>
        </div>

        <!-- Dress code простым текстом -->
        <div class="dress-code">Dress code: твоё любимое платье</div>

        <!-- Скрытое поле и кнопка открыть место -->
        <div class="secret-input">
            <input type="password" id="secretPassword" placeholder="Введи дату знакомства (ДД.ММ.ГГГГ)">
            <button class="btn" id="unlockMapBtn">🔓 Открыть место встречи</button>
        </div>

        <!-- Карта (появляется после пароля) -->
        <div class="map-place" id="mapContainer">
            <iframe id="yandexMap" src="about:blank"></iframe>
        </div>

        <!-- ТВОЁ ИЗОБРАЖЕНИЕ из Figma (заменишь ссылку) -->
        <div class="custom-image" id="customImageContainer">
            <img id="userDrawingImg" src="https://via.placeholder.com/400x200?text=Твой+рисунок+из+Figma" alt="Наша картинка">
        </div>

        <!-- Кнопка Пойду -->
        <button class="btn btn-primary" id="goBtn" style="width:100%; margin: 15px 0 10px;">Пойду</button>

        <!-- Две кнопки: Напомнить и Свернуть -->
        <div class="double-buttons">
            <button class="btn" id="remindTelegramBtn">🔔 Напомнить в Telegram</button>
            <button class="btn" id="closeModalBtn">Свернуть окно</button>
        </div>
    </div>
</div>

<script>
    // ======================= НАСТРОЙКИ (ТЫ МЕНЯЕШЬ ЗДЕСЬ) =======================
    // Дата свидания (только для таймера, 15 июня 2026 12:00)
    const targetDate = new Date(2026, 5, 15, 12, 0, 0);
    
    // Пароль (дата знакомства)
    const correctPassword = "01.09.2023";   // <- замени на свою
    
    // Ссылка на карту (Яндекс или Google)
    const meetingMapUrl = "https://yandex.ru/map-widget/v1/?um=constructor%3A123456&source=constructor";
    
    // ССЫЛКА НА ТВОЙ РИСУНОК ИЗ FIGMA (замени после того как нарисуешь)
    const yourFigmaImageUrl = "https://via.placeholder.com/500x300?text=Мой+рисунок+из+Figma+%F0%9F%8E%A8";
    // =========================================================================

    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const haptic = () => {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    };

    // Обновление таймера
    function updateTimers() {
        const now = new Date();
        const diff = targetDate - now;
        if (diff <= 0) {
            document.getElementById('countdownTimer').innerHTML = "Сегодня!";
            return;
        }
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff / (1000*60*60)) % 24);
        const mins = Math.floor((diff / (1000*60)) % 60);
        const secs = Math.floor((diff / 1000) % 60);
        document.getElementById('countdownTimer').innerHTML = `${days}д ${hours}ч ${mins}м ${secs}с`;
    }
    updateTimers();
    setInterval(updateTimers, 1000);

    // Элементы
    const modal = document.getElementById('fullModal');
    const viewBtn = document.getElementById('viewFullBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const goBtn = document.getElementById('goBtn');
    const remindBtn = document.getElementById('remindTelegramBtn');
    const unlockBtn = document.getElementById('unlockMapBtn');
    const passInput = document.getElementById('secretPassword');
    const mapContainer = document.getElementById('mapContainer');
    const mapIframe = document.getElementById('yandexMap');
    const userImg = document.getElementById('userDrawingImg');
    
    // Подставляем твою картинку (заменишь ссылку)
    userImg.src = yourFigmaImageUrl;

    // Открыть окно
    viewBtn.addEventListener('click', () => {
        modal.style.display = 'flex';
        haptic();
        tg.expand();
    });

    // Свернуть
    closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
        haptic();
    });

    // Пойду! с сердечками
    goBtn.addEventListener('click', () => {
        haptic();
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = Math.random() * 80 + '%';
            heart.style.fontSize = (20 + Math.random() * 30) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
        tg.showAlert("Спасибо! Жду с нетерпением ❤️");
    });

    // Напомнить
    remindBtn.addEventListener('click', () => {
        haptic();
        tg.showPopup({
            title: "Напоминание",
            message: "Я пришлю уведомление за час до свидания!",
            buttons: [{ type: "ok" }]
        });
    });

    // Открыть карту по паролю
    unlockBtn.addEventListener('click', () => {
        if (passInput.value.trim() === correctPassword) {
            haptic();
            mapContainer.style.display = 'block';
            mapIframe.src = meetingMapUrl;
            tg.showAlert("Вот место встречи. Никому не говори 🤫");
        } else {
            tg.showAlert("Неверная дата. Попробуй ещё раз");
            haptic();
        }
    });

    // Закрытие по клику на фон
    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });
</script>
</body>
</html>
